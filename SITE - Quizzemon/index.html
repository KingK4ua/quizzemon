<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizzemon - Versão Final</title>

<style>
/* RESET E BASE */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { height: 100vh; background: #ffffff; overflow: hidden; }

/* ================= MENU LATERAL ================= */
.sidebar {
    width: 410px; height: 100vh; background: #ffffff; border-right: 1px solid #ccc;
    padding: 35px; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 100;
}
.logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
.logo1 { width: 90px; height: 90px; }
.logo1 img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.logo2 { width: 140px; }
.logo2 img { width: 100%; object-fit: contain; }

.menu { list-style: none; }
.menu li { margin-bottom: 15px; }
.menu button {
    width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ffffff;
    background: #ffffff; color: #ff0c0c; font-weight: bold; display: flex;
    align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; font-size: 25px;
}
.menu button.active { border: 3px solid #ff0000; background: #ffcccc; }
.icon { width: 45px; height: 45px; }
.icon img { width: 100%; height: 100%; object-fit: contain; }

/* ================= ÁREA PRINCIPAL ================= */
.main-content { 
    margin-left: 410px; height: 100vh; overflow-y: auto; overflow-x: hidden; background: #ffffff; 
}
.unit-header img { width: 100%; display: block; }
.unit-box {
    width: 550px; margin: 40px auto; background: #ff0000; color: white;
    padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 6px 0 #b30000;
}

/* ================= TRILHA EM ONDA ================= */
.quiz-area { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 40px 0 120px 0; width: 100%; }
.quiz-row { width: 100%; display: flex; justify-content: center; height: 100px; }

/* Posições da Curva Suave */
.quiz-row:nth-child(8n+1) { transform: translateX(0px); }
.quiz-row:nth-child(8n+2) { transform: translateX(50px); }
.quiz-row:nth-child(8n+3) { transform: translateX(85px); }
.quiz-row:nth-child(8n+4) { transform: translateX(55px); }
.quiz-row:nth-child(8n+5) { transform: translateX(0px); }
.quiz-row:nth-child(8n+6) { transform: translateX(-55px); }
.quiz-row:nth-child(8n+7) { transform: translateX(-85px); }
.quiz-row:nth-child(8n+8) { transform: translateX(-50px); }

.quiz-item { width: 95px; height: 90px; cursor: pointer; position: relative; transition: transform 0.1s ease; }
.quiz-item img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 5px 0 rgba(0,0,0,0.2)); }
.quiz-item:hover { transform: translateY(4px); }
.quiz-item:hover img { filter: drop-shadow(0 1px 0 rgba(0,0,0,0.2)); }
.quiz-item.locked { filter: grayscale(100%) brightness(0.7); cursor: not-allowed; opacity: 0.6; pointer-events: none; }

/* TAG COMEÇAR */
.start-tag {
    position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
    background: #fff; padding: 8px 18px; border-radius: 12px; border: 2px solid #e5e5e5;
    box-shadow: 0 4px 0 rgba(0,0,0,0.05); font-weight: 800; color: #58cc02;
    font-size: 15px; text-transform: uppercase; transition: opacity 0.2s ease; z-index: 10;
}
.start-tag::after {
    content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent;
    border-top: 10px solid #ffffff; filter: drop-shadow(0 2px 0 #e5e5e5);
}
.fade-out { opacity: 0; pointer-events: none; }

/* ================= MODAL POKEMON ================= */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;
}
.modal-content {
    background: #00cd9b; width: 350px; padding: 25px; border-radius: 20px;
    text-align: center; color: white; position: relative; box-shadow: 0 10px 0 #00a57d;
}
.pokemon-3d-icon { width: 80px; background: white; border-radius: 50%; padding: 10px; border: 4px solid #e5e5e5; margin-top: -65px; margin-bottom: 15px; }
.btn-modal-start {
    width: 100%; background: white; color: #00cd9b; border: none; padding: 15px;
    border-radius: 15px; font-weight: 900; margin-top: 20px; cursor: pointer;
    box-shadow: 0 4px 0 #e5e5e5; text-transform: uppercase;
}

/* ================= TELA DE QUIZ ================= */
.quiz-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; }
.quiz-header { display: flex; align-items: center; padding: 20px 50px; gap: 20px; }
.exit-btn { background: none; border: none; font-size: 25px; color: #afafaf; cursor: pointer; }
.progress-container { flex-grow: 1; height: 16px; background: #e5e5e5; border-radius: 10px; }
.progress-fill { height: 100%; background: #ff4b91; border-radius: 10px; transition: width 0.3s ease; width: 0%; }
.question-section { flex-grow: 1; max-width: 600px; margin: 0 auto; text-align: center; padding-top: 40px; }
.options-container { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
.option-btn {
    background: white; border: 2px solid #e5e5e5; border-bottom: 5px solid #e5e5e5;
    padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; color: #4b4b4b;
    cursor: pointer; transition: all 0.1s;
}
.option-btn.selected { background-color: #ddf4ff; border-color: #1cb0f6; border-bottom-color: #1899d6; color: #1cb0f6; }
.quiz-footer { padding: 30px 50px; border-top: 2px solid #e5e5e5; display: flex; justify-content: space-between; }
.verificar-btn { background: #e5e5e5; border: none; padding: 12px 60px; border-radius: 12px; font-weight: bold; color: white; cursor: not-allowed; }
.verificar-btn.active { background: #58cc02; cursor: pointer; box-shadow: 0 4px 0 #46a302; }

footer { width: 100%; padding: 30px 0; background: #fff; border-top: 2px solid #e5e5e5; text-align: center; margin-top: 50px; }
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo-area">
        <div class="logo1"><img src="img/logo redonda.png"></div>
        <div class="logo2"><img src="img/nome quizzemon.png"></div>
    </div>
    <ul class="menu">
        <li><button class="menu-btn active"><div class="icon"><img src="img/icon pikachu.png"></div> QUIZZES</button></li>
        <li><button class="menu-btn"><div class="icon"><img src="img/pokebolas/ace/1 acesso.png"></div> PERFIL</button></li>
        <li><button class="menu-btn"><div class="icon"><img src="img/icon engre.png"></div> CONFIGURAÇÃO</button></li>
    </ul>
</div>

<div class="main-content">
    <div class="unit-header"><img src="img/pokegigante header central.png"></div>
    <div class="unit-box"><h2>SEÇÃO 1, UNIDADE</h2><p>Descubra suas habilidades</p></div>

    <div class="quiz-area" id="trilha"> 
        <div class="quiz-row"><div class="quiz-item current"><div class="start-tag">COMEÇAR</div><img src="img/pokebolas/ace/1 acesso.png"></div></div>
        <div class="quiz-row"><div class="quiz-item"><img src="img/pokebolas/apa/2 apagado.png"></div></div>
        <div class="quiz-row"><div class="quiz-item locked"><img src="img/pokebolas/apa/3 apagado.png"></div></div>
        <div class="quiz-row"><div class="quiz-item locked"><img src="img/pokebolas/apa/4 apagado.png"></div></div>
        <div class="quiz-row"><div class="quiz-item locked"><img src="img/pokebolas/apa/5 apagado.png"></div></div>
        <div class="quiz-row"><div class="quiz-item locked"><img src="img/pokebolas/apa/6 apagado.png"></div></div>
        <div class="quiz-row"><div class="quiz-item locked"><img src="img/pokebolas/apa/7 apagado.png"></div></div>
    </div>
    
    <footer><p style="color:#afafaf; font-weight:bold;">&copy; 2024 QUIZZEMON</p></footer>
</div>

<div id="pokemon-modal" class="modal-overlay">
    <div class="modal-content">
        <img src="img/icon pikachu.png" class="pokemon-3d-icon">
        <h3>Fale sobre o Pikachu</h3>
        <p>Lição 1 de 10</p>
        <button class="btn-modal-start">COMEÇAR +10 XP</button>
    </div>
</div>

<div id="quiz-screen" class="quiz-container">
    <div class="quiz-header">
        <button class="exit-btn" id="btn-sair">✕</button>
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
    </div>
    <div class="question-section">
        <h1 id="question-text">Carregando pergunta...</h1>
        <div class="options-container" id="options"></div>
    </div>
    <div class="quiz-footer">
        <button class="exit-btn" style="font-size:16px; font-weight:bold;">PULAR</button>
        <button id="verificar-btn" class="verificar-btn" disabled>VERIFICAR</button>
    </div>
</div>

<script src="perguntas.js"></script> <script>
// Dados de exemplo caso perguntas.js falhe
if (typeof baseDeDadosQuizzes === 'undefined') {
    var baseDeDadosQuizzes = {
        quiz1: [{ pergunta: "Qual o tipo do Pikachu?", opcoes: ["Fogo", "Elétrico", "Água", "Gelo"], correta: 1 }]
    };
}

const startBtn = document.querySelector(".quiz-item.current");
const startTag = document.querySelector(".start-tag");
const modal = document.getElementById("pokemon-modal");
const quizScreen = document.getElementById("quiz-screen");
const verifyBtn = document.getElementById("verificar-btn");

let perguntaIndex = 0;
let selecionada = null;

// ABRIR MODAL
startBtn.addEventListener("click", () => {
    startTag.classList.add("fade-out");
    setTimeout(() => { modal.style.display = "flex"; }, 200);
});

// CANCELAR MODAL
window.addEventListener("click", (e) => {
    if (e.target === modal) {
        modal.style.display = "none";
        startTag.classList.remove("fade-out");
    }
});

// INICIAR QUIZ
document.querySelector(".btn-modal-start").addEventListener("click", () => {
    modal.style.display = "none";
    quizScreen.style.display = "flex";
    carregarPergunta();
});

function carregarPergunta() {
    const dados = baseDeDadosQuizzes.quiz1[perguntaIndex];
    document.getElementById("question-text").innerText = dados.pergunta;
    const container = document.getElementById("options");
    container.innerHTML = "";
    
    dados.opcoes.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.classList.add("option-btn");
        btn.innerText = opt;
        btn.onclick = () => {
            document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            selecionada = i;
            verifyBtn.disabled = false;
            verifyBtn.classList.add("active");
        };
        container.appendChild(btn);
    });
    
    const prog = ((perguntaIndex) / baseDeDadosQuizzes.quiz1.length) * 100;
    document.getElementById("progress-bar").style.width = prog + "%";
}

verifyBtn.addEventListener("click", () => {
    if(selecionada === baseDeDadosQuizzes.quiz1[perguntaIndex].correta) {
        perguntaIndex++;
        if(perguntaIndex < baseDeDadosQuizzes.quiz1.length) {
            carregarPergunta();
        } else {
            alert("Parabéns! Quiz Concluído.");
            location.reload();
        }
    } else {
        alert("Resposta errada! Tenta novamente.");
    }
});

document.getElementById("btn-sair").onclick = () => location.reload();
</script>

</body>
</html>
